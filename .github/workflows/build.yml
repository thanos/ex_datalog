name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test — Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Elixir 1.18.x ---
          - elixir: "1.18.0"
            otp: "27.0"
          - elixir: "1.18.4"
            otp: "27.3"

          # --- Elixir 1.19.x ---
          - elixir: "1.19.0"
            otp: "27.1"
          - elixir: "1.19.5"
            otp: "27.3"
          - elixir: "1.19.5"
            otp: "28.3.1"
            coverage: true   # coverage reported for the canonical version only

          # --- Elixir 1.18.x on OTP 28 ---
          - elixir: "1.18.4"
            otp: "28.3.1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: mix test --exclude integration

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: mix coveralls.github --exclude integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
